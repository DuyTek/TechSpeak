<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <div id="header">

      <!-- Brand header (Search / Browse / Saved / Today views) -->
      <div id="header-brand">
        <div class="brand">
          <span class="brand-logo" aria-hidden="true"></span>
          <span class="brand-name">TechSpeak</span>
        </div>
        <button type="button" class="btn-icon" id="close-btn" aria-label="Close TechSpeak">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>

      <!-- Definition header (Result view) -->
      <div id="header-def" class="hidden">
        <button type="button" class="btn-icon" id="back-btn" aria-label="Go back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <span id="def-header-title" class="def-header-label"></span>
        <div class="header-actions">
          <button type="button" class="btn-icon" id="bookmark-btn" aria-label="Save term">
            <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 4h12a1 1 0 0 1 1 1v15l-7-4-7 4V5a1 1 0 0 1 1-1z"/>
            </svg>
          </button>
          <button type="button" class="btn-icon" id="close-btn-def" aria-label="Close TechSpeak">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18"/>
            </svg>
          </button>
        </div>
      </div>

    </div>

    <!-- ── Content ────────────────────────────────────────────────────── -->
    <div id="content">

      <!-- Search view -->
      <div id="view-search" class="view" aria-label="Search">
        <div class="search-sticky">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="7"/>
              <path d="M21 21l-4-4" stroke-linecap="round"/>
            </svg>
            <input type="text" id="search-input" placeholder="Search terms…" autocomplete="off" spellcheck="false">
          </div>
        </div>
        <div id="search-list" class="term-list"></div>
        <div id="search-empty" class="no-results hidden">
          <p class="no-results-heading">No match yet</p>
          <p class="no-results-hint">Try "flag", "debt", or "race".</p>
        </div>
      </div>

      <!-- Browse / Glossary view -->
      <div id="view-browse" class="view hidden" aria-label="Glossary">
        <div id="browse-meta" class="list-meta"></div>
        <div id="browse-list" class="term-list"></div>
      </div>

      <!-- Saved view -->
      <div id="view-saved" class="view hidden" aria-label="Saved terms">
        <div id="saved-content"></div>
      </div>

      <!-- Today view -->
      <div id="view-today" class="view hidden" aria-label="Today">
        <div id="today-content" class="today-wrap"></div>
      </div>

      <!-- Definition / Result view -->
      <div id="view-result" class="view hidden" aria-label="Definition">
        <div id="result-content" class="result-wrap"></div>
      </div>

    </div>

    <!-- ── Tab bar ────────────────────────────────────────────────────── -->
    <div id="tab-bar" role="tablist" aria-label="Views">

      <button type="button" class="tab active" data-tab="search" role="tab" aria-selected="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-4-4" stroke-linecap="round"/>
        </svg>
        <span>Search</span>
      </button>

      <button type="button" class="tab" data-tab="browse" role="tab" aria-selected="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 5a2 2 0 0 1 2-2h11v16H6a2 2 0 0 0-2 2z"/>
          <path d="M17 3h1a2 2 0 0 1 2 2v14a2 2 0 0 0-2 2h-1"/>
        </svg>
        <span>Glossary</span>
      </button>

      <button type="button" class="tab" data-tab="saved" role="tab" aria-selected="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 4h12a1 1 0 0 1 1 1v15l-7-4-7 4V5a1 1 0 0 1 1-1z"/>
        </svg>
        <span>Saved</span>
      </button>

      <button type="button" class="tab" data-tab="today" role="tab" aria-selected="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <span>Today</span>
      </button>

    </div>
  </div>

  <script src="popup.js" defer></script>
</body>
</html>
